{% extends 'dashboard/base.html' %}{% block page_title %}Mapa de incidencias{% endblock %}{% block content %}<div class="card shadow-sm border-0"><div class="card-body"><h5 class="card-title">Incidencias georreferenciadas</h5><div id="map" style="height:520px;border-radius:18px;"></div></div></div><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>const map=L.map('map').setView([-4.0,-79.2],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);const items=[{% for i in items %}{lat: {{ i.latitud or -4.0 }}, lng: {{ i.longitud or -79.2 }}, title: {{ (i.titulo or i.tipo_incidencia)|tojson }}, estado: {{ i.estado|tojson }}, usuario: {{ (i.usuario.nombre_completo if i.usuario else '')|tojson }}, descripcion: {{ i.descripcion|tojson }} }{% if not loop.last %},{% endif %}{% endfor %}];items.forEach(i=>{const m=L.marker([i.lat,i.lng]).addTo(map);m.bindPopup(`<strong>${i.title}</strong><br>${i.estado}<br>${i.usuario}<br>${i.descripcion}`)});if(items.length){const group=L.featureGroup(items.map(i=>L.marker([i.lat,i.lng])));map.fitBounds(group.getBounds().pad(0.2));}</script>{% endblock %}
